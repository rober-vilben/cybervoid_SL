<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo producto')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('admin')}"></header>
<main class="page-main">
  <section class="category-hero"><div class="container"><p class="eyebrow text-dark mb-2">Producto</p><h1 class="page-title display-4 text-uppercase">Nuevo producto</h1></div></section>
  <section class="section-pad"><div class="container"><div class="row justify-content-center"><div class="col-lg-8">
    <form class="profile-panel row g-3" th:action="@{/admin/productos}" th:object="${producto}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <label class="col-md-6">SKU<input class="form-control mt-1" th:field="*{sku}" required></label>
      <label class="col-md-6">Nombre<input class="form-control mt-1" th:field="*{nombre}" required></label>
      <label class="col-12">Descripcion<textarea class="form-control mt-1" th:field="*{descripcion}" rows="3"></textarea></label>
      <label class="col-md-4">Talla<input class="form-control mt-1" th:field="*{talla}"></label>
      <label class="col-md-4">Color<input class="form-control mt-1" th:field="*{color}"></label>
      <label class="col-md-4">Stock<input class="form-control mt-1" type="number" min="0" th:field="*{stock}" required></label>
      <label class="col-md-6">Precio<input class="form-control mt-1" type="number" step="0.01" min="0.01" th:field="*{precio}" required></label>
      <label class="col-md-6">Precio anterior<input class="form-control mt-1" type="number" step="0.01" min="0" th:field="*{precioAnterior}"></label>
      <label class="col-12">Imagen<input class="form-control mt-1" th:field="*{imagenUrl}" placeholder="assets/img/product-camiseta.svg"></label>
      <label class="col-md-6">Categoria<select class="form-select mt-1" th:field="*{categoria}" required><option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:text="${categoria.nombre}">Categoria</option></select></label>
      <label class="col-md-6">Proveedor<select class="form-select mt-1" th:field="*{proveedor}" required><option th:each="proveedor : ${proveedores}" th:value="${proveedor.id}" th:text="${proveedor.nombre}">Proveedor</option></select></label>
      <div class="col-12 d-flex gap-2"><button class="btn btn-cv-dark" type="submit">Guardar</button><a class="btn btn-outline-dark" th:href="@{/admin}">Cancelar</a></div>
    </form>
  </div></div></div></section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
