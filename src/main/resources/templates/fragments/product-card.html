<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<article th:fragment="card(producto)" class="product-card">
  <img th:src="@{'/' + ${producto.imagenUrl}}" th:alt="${producto.nombre}">
  <div class="product-body">
    <h2 class="product-title" th:text="${producto.nombre}">Producto</h2>
    <p class="product-desc" th:text="${producto.descripcion}">Descripcion</p>
    <p class="product-meta" th:text="${'Talla ' + producto.talla + ' · ' + producto.color}">Talla M · Negro</p>
    <div class="price-row mb-3">
      <span class="old-price" th:if="${producto.precioAnterior != null}" th:text="${#numbers.formatDecimal(producto.precioAnterior, 1, 2, 'COMMA')} + ' EUR'">39,90 EUR</span>
      <span class="new-price" th:text="${#numbers.formatDecimal(producto.precio, 1, 2, 'COMMA')} + ' EUR'">24,90 EUR</span>
    </div>
    <form th:action="@{/carrito/anadir/{id}(id=${producto.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button class="btn btn-cv-dark w-100" type="submit" th:disabled="${producto.stock <= 0}">
        <span th:text="${producto.stock > 0 ? 'Anadir al carrito' : 'Sin stock'}">Anadir al carrito</span>
      </button>
    </form>
  </div>
</article>
</body>
</html>
