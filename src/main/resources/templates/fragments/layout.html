<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav(active)" class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}"><span class="brand-mark">CV</span>CyberVoid S.L.</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Abrir navegacion"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link" th:classappend="${active == 'inicio'} ? ' active'" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${active == 'mujer'} ? ' active'" th:href="@{/mujer}">Mujer</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${active == 'hombre'} ? ' active'" th:href="@{/hombre}">Hombre</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${active == 'ofertas'} ? ' active'" th:href="@{/ofertas}">Ofertas</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${active == 'carrito'} ? ' active'" th:href="@{/carrito}">Carrito</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:classappend="${active == 'usuario'} ? ' active'" th:href="@{/usuario}">Usuario</a></li>
        <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
        <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-sm btn-outline-light" type="submit">Salir</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div th:fragment="head(title)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' | CyberVoid S.L.'">CyberVoid S.L.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</div>

<div th:fragment="alerts">
  <div class="container pt-3" th:if="${ok != null || error != null}">
    <div class="alert alert-success" th:if="${ok != null}" th:text="${ok}"></div>
    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
  </div>
</div>

<footer th:fragment="footer" class="cv-footer py-4">
  <div class="container d-flex justify-content-between gap-2 flex-wrap">
    <span>CyberVoid S.L.</span>
    <span>Spring Boot, Spring MVC, JPA, MySQL, Thymeleaf y Spring Security</span>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>
</body>
</html>
