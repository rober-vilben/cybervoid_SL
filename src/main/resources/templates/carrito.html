<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Carrito')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('carrito')}"></header>
<main class="page-main">
  <section class="category-hero"><div class="container"><p class="eyebrow text-dark mb-2">Compra</p><h1 class="page-title display-4 text-uppercase">Carrito</h1><p class="text-muted-strong col-lg-6">Carrito persistente asociado al usuario autenticado.</p></div></section>
  <section th:replace="~{fragments/layout :: alerts}"></section>
  <section class="section-pad"><div class="container">
    <div class="cart-empty" th:if="${#lists.isEmpty(carrito.lineas)}"><h2 class="h4 text-uppercase fw-bold">Tu carrito esta vacio</h2><p class="text-muted mb-3">Anade prendas desde el catalogo.</p><a class="btn btn-cv-dark" th:href="@{/}">Volver a inicio</a></div>
    <div class="cart-panel p-3 p-lg-4" th:if="${!#lists.isEmpty(carrito.lineas)}">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead><tr><th>Producto</th><th>Talla</th><th>Color</th><th>Cantidad</th><th>Precio</th><th>Total</th><th></th></tr></thead>
          <tbody>
          <tr th:each="linea : ${carrito.lineas}">
            <td><div class="fw-bold text-uppercase" th:text="${linea.producto.nombre}">Producto</div><small class="text-muted" th:text="${linea.producto.sku}">SKU</small></td>
            <td th:text="${linea.producto.talla}">M</td>
            <td th:text="${linea.producto.color}">Negro</td>
            <td style="width: 140px;">
              <form th:action="@{/carrito/linea/{id}(id=${linea.id})}" method="post" class="d-flex gap-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="form-control form-control-sm" name="cantidad" type="number" min="1" th:max="${linea.producto.stock}" th:value="${linea.cantidad}">
                <button class="btn btn-sm btn-outline-dark" type="submit">OK</button>
              </form>
            </td>
            <td th:text="${#numbers.formatDecimal(linea.producto.precio, 1, 2, 'COMMA')} + ' EUR'">0 EUR</td>
            <td class="fw-bold" th:text="${#numbers.formatDecimal(linea.subtotal, 1, 2, 'COMMA')} + ' EUR'">0 EUR</td>
            <td>
              <form th:action="@{/carrito/eliminar/{id}(id=${linea.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-dark" type="submit">Eliminar</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mt-4">
        <div><span class="text-muted">Total del carrito</span><div class="h3 fw-black mb-0" th:text="${#numbers.formatDecimal(carrito.total, 1, 2, 'COMMA')} + ' EUR'">0 EUR</div></div>
        <form th:action="@{/carrito/confirmar}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn btn-cv-dark" type="submit">Finalizar compra</button>
        </form>
      </div>
    </div>
  </div></section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
